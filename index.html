<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sudoku</title>

<style>
:root {
  --bg: #f5f5f5;
  --grid: #222;
  --cell: #ffffff;
  --primary: #4a90e2;
  --text: #333;
  --error: #ff6b6b;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
  color: var(--text);
}

.controls {
  margin-bottom: 20px;
}

button {
  padding: 8px 16px;
  margin: 5px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #eee;
}

button.active {
  background: var(--primary);
  color: white;
}

#grid {
  display: grid;
  grid-template-columns: repeat(9, 40px);
  grid-template-rows: repeat(9, 40px);
  border: 2px solid var(--grid);
}



.cell:nth-child(3n) {
  border-right: 2px solid var(--grid);
}

.cell:nth-child(n+19):nth-child(-n+27),
.cell:nth-child(n+46):nth-child(-n+54) {
  border-bottom: 2px solid var(--grid);
}

.cell.fixed {
  background: #ddd;
  font-weight: bold;
}

.cell.selected {
  background: #cce5ff;
}

.cell.error {
  color: var(--error);
}

.numpad {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  width: 200px;
}

footer {
  margin-top: 20px;
  font-size: 14px;
  color: #777;
}
</style>
</head>

<body>

<h1>Sudoku</h1>

<div class="controls">
  <button onclick="setDifficulty('easy')" id="btn-easy">Easy</button>
  <button onclick="setDifficulty('medium')" id="btn-medium">Medium</button>
  <button onclick="setDifficulty('hard')" id="btn-hard">Hard</button>
  <button onclick="resetGame()">Reset</button>
</div>

<div id="grid"></div>

<div class="numpad">
  <button onclick="inputNumber(1)">1</button>
  <button onclick="inputNumber(2)">2</button>
  <button onclick="inputNumber(3)">3</button>
  <button onclick="inputNumber(4)">4</button>
  <button onclick="inputNumber(5)">5</button>
  <button onclick="inputNumber(6)">6</button>
  <button onclick="inputNumber(7)">7</button>
  <button onclick="inputNumber(8)">8</button>
  <button onclick="inputNumber(9)">9</button>
  <button onclick="inputNumber(0)">⌫</button>
</div>

<footer>Simple Sudoku</footer>

<script>
let selectedCell = null;
let difficulty = "easy";
let solution = [];
let initialGrid = [];

function setDifficulty(level) {
  difficulty = level;
  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  document.getElementById("btn-" + level).classList.add("active");
  generateGame();
}

function generateGame() {
  solution = generateSolvedGrid();
  let blanks = difficulty === "easy" ? 30 : difficulty === "medium" ? 45 : 55;

  initialGrid = solution.map(row => [...row]);

  let count = 0;
  while (count < blanks) {
    let r = Math.floor(Math.random() * 9);
    let c = Math.floor(Math.random() * 9);
    if (initialGrid[r][c] !== 0) {
      initialGrid[r][c] = 0;
      count++;
    }
  }

  drawGrid();
}

function generateSolvedGrid() {
  let grid = Array(9).fill().map(() => Array(9).fill(0));
  solveGrid(grid);
  return grid;
}

function solveGrid(grid) {
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      if (grid[r][c] === 0) {
        let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
        for (let n of nums) {
          if (isSafe(grid, r, c, n)) {
            grid[r][c] = n;
            if (solveGrid(grid)) return true;
            grid[r][c] = 0;
          }
        }
        return false;
      }
    }
  }
  return true;
}

function isSafe(grid, r, c, n) {
  for (let i = 0; i < 9; i++)
    if (grid[r][i] === n || grid[i][c] === n) return false;

  let rs = Math.floor(r/3)*3;
  let cs = Math.floor(c/3)*3;

  for (let i = rs; i < rs+3; i++)
    for (let j = cs; j < cs+3; j++)
      if (grid[i][j] === n) return false;

  return true;
}

function drawGrid() {
  const gridEl = document.getElementById("grid");
  gridEl.innerHTML = "";

  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      const cell = document.createElement("div");
      cell.classList.add("cell");

      if (initialGrid[r][c] !== 0) {
        cell.innerText = initialGrid[r][c];
        cell.classList.add("fixed");
      } else {
        cell.onclick = () => {
          if (selectedCell) selectedCell.classList.remove("selected");
          selectedCell = cell;
          cell.classList.add("selected");
        };
      }

      cell.id = `cell-${r}-${c}`;
      gridEl.appendChild(cell);
    }
  }
}

function inputNumber(num) {
  if (!selectedCell) return;

  let [_, r, c] = selectedCell.id.split("-");
  r = parseInt(r);
  c = parseInt(c);

  if (num === 0) {
    selectedCell.innerText = "";
    selectedCell.classList.remove("error");
  } else {
    selectedCell.innerText = num;
    if (num !== solution[r][c]) {
      selectedCell.classList.add("error");
    } else {
      selectedCell.classList.remove("error");
      checkWin();
    }
  }
}

function checkWin() {
  let cells = document.querySelectorAll(".cell");
  for (let c of cells) {
    let [_, r, col] = c.id.split("-");
    if (parseInt(c.innerText) !== solution[r][col]) return;
  }
  alert("You Win!");
}

function resetGame() {
  generateGame();
}

document.addEventListener("keydown", e => {
  if (e.key >= 1 && e.key <= 9) inputNumber(parseInt(e.key));
  if (e.key === "Backspace") inputNumber(0);
});

setDifficulty("easy");
</script>

</body>
</html>
