<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku | Prometheus Edition</title>
    <style>
        /* Color Palette from Image */
        :root {
            --bg-cream: #FBE9D0;
            --deep-teal: #244855;
            --accent-orange: #E64833;
            --dusty-brown: #874F41;
            --muted-blue: #90AEAD;
            --white: #ffffff;
            
            /* Background variables */
            --s: 56px;
            --g: 10px;
            --c: #ECD078;
            --_l: #0000 calc(33% - .866*var(--g)),var(--c) calc(33.2% - .866*var(--g)) 33%,#0000 34%;
        }

        /* Animated Background Logic */
        html {
            height: 100%;
            background: #0B486B; /* Fallback second color */
            overflow-x: hidden;
        }

        html:before, body:before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                repeating-linear-gradient(var(--c) 0 var(--g), #0000 0 50%)
                0 calc(.866*var(--s) - var(--g)/2),
                conic-gradient(from -150deg at var(--g) 50%,var(--c) 120deg,#0000 0),
                linear-gradient(-120deg,var(--_l)),linear-gradient( -60deg,var(--_l))
                #0B486B;
            background-size: var(--s) calc(3.466*var(--s));
            animation: p infinite 2s linear;
        }

        body:before {
            -webkit-mask: 
                linear-gradient(#000 50%,#0000 0) 
                0 calc(.866*var(--s))/100% calc(3.466*var(--s));
            animation-direction: reverse;
        }

        @keyframes p {
            to { background-position-x: calc(-1*var(--s)); }
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            color: var(--deep-teal);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Hack Club Flag - approx 3cm (114px) */
        .hc-flag {
            position: absolute;
            top: 0;
            left: 10px;
            border: 0;
            width: 114px; /* Approx 3cm on standard screens */
            z-index: 999;
        }

        header {
            text-align: center;
            margin-top: 60px; /* Space for flag */
            margin-bottom: 20px;
            background: rgba(251, 233, 208, 0.9);
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-orange);
        }

        /* Switch/Pill Design Controls */
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        button {
            padding: 10px 24px;
            border: none;
            background: var(--white);
            color: var(--deep-teal);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            border-radius: 50px; /* Pill design */
            box-shadow: 0 4px 0px var(--dusty-brown);
            position: relative;
            top: 0;
        }

        button:hover {
            top: -2px;
            box-shadow: 0 6px 0px var(--dusty-brown);
            background: var(--bg-cream);
        }

        button:active {
            top: 2px;
            box-shadow: 0 0px 0px var(--dusty-brown);
        }

        button.active {
            background: var(--accent-orange);
            color: var(--white);
            box-shadow: 0 4px 0px #a32a1b;
        }

        .music-btn {
            width: 50px;
            height: 50px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* Sudoku Grid */
        #grid {
            display: grid;
            grid-template-columns: repeat(9, 45px);
            grid-template-rows: repeat(9, 45px);
            border: 5px solid var(--deep-teal);
            background-color: var(--deep-teal);
            gap: 1px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            overflow: hidden;
        }

        .cell {
            width: 45px;
            height: 45px;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        /* 3x3 block borders */
        .cell:nth-child(3n) { border-right: 3px solid var(--deep-teal); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 3px solid var(--deep-teal);
        }

        .cell.fixed {
            background-color: #eee;
            color: var(--dusty-brown);
            font-weight: bold;
        }

        .cell.selected {
            background-color: var(--muted-blue) !important;
            color: var(--white);
        }

        .cell.error {
            color: var(--accent-orange);
            background-color: #ffdce0;
        }

        /* Number Pad */
        .numpad {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 20px;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            padding: 20px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3);
            width: 100%;
            text-align: center;
        }

        /* Modal */
        #win-card {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--white);
            padding: 40px;
            border: 10px solid var(--accent-orange);
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            border-radius: 30px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 998;
        }

        @media (max-width: 500px) {
            #grid { grid-template-columns: repeat(9, 35px); grid-template-rows: repeat(9, 35px); }
            .cell { width: 35px; height: 35px; font-size: 1rem; }
            .hc-flag { width: 80px; }
        }
    </style>
</head>
<body>

    <a href="https://hackclub.com/">
        <img class="hc-flag" src="https://assets.hackclub.com/flag-orpheus-top.svg" alt="Hack Club"/>
    </a>

    <header>
        <h1>Sudoku</h1>
        <p>Prometheus Edition</p>
    </header>

    <div class="controls">
        <button onclick="setDifficulty('easy')" id="btn-easy">Easy</button>
        <button onclick="setDifficulty('medium')" id="btn-medium">Medium</button>
        <button onclick="setDifficulty('hard')" id="btn-hard">Hard</button>
        <button onclick="resetGame()">Reset</button>
        <button class="music-btn" onclick="toggleMusic()" id="music-toggle">🔇</button>
    </div>

    <div id="grid"></div>

    <div class="numpad">
        <button onclick="inputNumber(1)">1</button>
        <button onclick="inputNumber(2)">2</button>
        <button onclick="inputNumber(3)">3</button>
        <button onclick="inputNumber(4)">4</button>
        <button onclick="inputNumber(5)">5</button>
        <button onclick="inputNumber(6)">6</button>
        <button onclick="inputNumber(7)">7</button>
        <button onclick="inputNumber(8)">8</button>
        <button onclick="inputNumber(9)">9</button>
        <button onclick="inputNumber(0)" style="background: var(--accent-orange); color: white;">⌫</button>
    </div>

    <footer>
        By Sadrita Neogi ( Hack Club )
    </footer>

    <div class="overlay" id="overlay"></div>
    <div id="win-card">
        <h2>VICTORY!</h2>
        <p>Puzzle Master Status Achieved.</p><br>
        <button onclick="closeWinCard()">New Game</button>
    </div>

    <audio id="bg-audio" loop>
        <source src="songbg.mp3" type="audio/mpeg">
    </audio>

    <script>
        let selectedCell = null;
        let difficulty = 'easy';
        let solution = [];
        let initialGrid = [];
        const audio = document.getElementById('bg-audio');
        let musicOn = false;

        function toggleMusic() {
            musicOn = !musicOn;
            const btn = document.getElementById('music-toggle');
            if (musicOn) {
                audio.play().catch(e => console.log("Audio play blocked by browser"));
                btn.innerText = "🔊";
                btn.classList.add('active');
            } else {
                audio.pause();
                btn.innerText = "🔇";
                btn.classList.remove('active');
            }
        }

        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            const target = document.getElementById('btn-' + level);
            if(target) target.classList.add('active');
            generateGame();
        }

        function generateGame() {
            solution = generateSolvedGrid();
            let blanks = difficulty === 'easy' ? 35 : difficulty === 'medium' ? 48 : 58;
            initialGrid = solution.map(row => [...row]);
            
            let count = 0;
            while (count < blanks) {
                let r = Math.floor(Math.random() * 9);
                let c = Math.floor(Math.random() * 9);
                if (initialGrid[r][c] !== 0) {
                    initialGrid[r][c] = 0;
                    count++;
                }
            }
            drawGrid();
        }

        function generateSolvedGrid() {
            let grid = Array(9).fill().map(() => Array(9).fill(0));
            solveGrid(grid);
            return grid;
        }

        function solveGrid(grid) {
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    if (grid[row][col] === 0) {
                        let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                        for (let n of nums) {
                            if (isSafe(grid, row, col, n)) {
                                grid[row][col] = n;
                                if (solveGrid(grid)) return true;
                                grid[row][col] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }

        function isSafe(grid, r, c, n) {
            for (let i = 0; i < 9; i++) if (grid[r][i] === n || grid[i][c] === n) return false;
            let rs = Math.floor(r / 3) * 3, cs = Math.floor(c / 3) * 3;
            for (let i = rs; i < rs + 3; i++) for (let j = cs; j < cs + 3; j++) if (grid[i][j] === n) return false;
            return true;
        }

        function drawGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (initialGrid[r][c] !== 0) {
                        cell.innerText = initialGrid[r][c];
                        cell.classList.add('fixed');
                    } else {
                        cell.addEventListener('click', () => {
                            if (selectedCell) selectedCell.element.classList.remove('selected');
                            selectedCell = { element: cell, row: r, col: c };
                            cell.classList.add('selected');
                        });
                    }
                    cell.id = `cell-${r}-${c}`;
                    container.appendChild(cell);
                }
            }
        }

        function inputNumber(num) {
            if (!selectedCell) return;
            if (num === 0) {
                selectedCell.element.innerText = '';
                selectedCell.element.classList.remove('error');
            } else {
                selectedCell.element.innerText = num;
                if (num !== solution[selectedCell.row][selectedCell.col]) {
                    selectedCell.element.classList.add('error');
                } else {
                    selectedCell.element.classList.remove('error');
                    checkWin();
                }
            }
        }

        function checkWin() {
            const cells = document.querySelectorAll('.cell');
            let win = true;
            cells.forEach(c => {
                let parts = c.id.split('-');
                let r = parseInt(parts[1]), col = parseInt(parts[2]);
                if (parseInt(c.innerText) !== solution[r][col]) win = false;
            });
            if (win) {
                document.getElementById('win-card').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            }
        }

        function resetGame() { generateGame(); }
        function closeWinCard() {
            document.getElementById('win-card').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            generateGame();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key >= 1 && e.key <= 9) inputNumber(parseInt(e.key));
            if (e.key === 'Backspace' || e.key === 'Delete') inputNumber(0);
        });

        setDifficulty('easy');
    </script>
</body>
