<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku | Prometheus Edition</title>
    <style>
        /* Color Palette from Image */
        :root {
            --bg-cream: #FBE9D0;
            --deep-teal: #244855;
            --accent-orange: #E64833;
            --dusty-brown: #874F41;
            --muted-blue: #90AEAD;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--deep-teal);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-orange);
            margin-bottom: 10px;
        }

        /* Controls */
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: 2px solid var(--deep-teal);
            background: transparent;
            color: var(--deep-teal);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            border-radius: 4px;
        }

        button:hover {
            background: var(--deep-teal);
            color: var(--bg-cream);
        }

        button.active {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
            color: var(--white);
        }

        .music-btn {
            border-radius: 50%;
            width: 45px;
            height: 45px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Sudoku Grid */
        #grid {
            display: grid;
            grid-template-columns: repeat(9, 45px);
            grid-template-rows: repeat(9, 45px);
            border: 3px solid var(--deep-teal);
            background-color: var(--deep-teal);
            gap: 1px;
            box-shadow: 0 10px 30px rgba(36, 72, 85, 0.2);
        }

        .cell {
            width: 45px;
            height: 45px;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
        }

        /* Grid Borders for 3x3 blocks */
        .cell:nth-child(3n) { border-right: 2px solid var(--deep-teal); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid var(--deep-teal);
        }

        .cell.fixed {
            background-color: #f0f0f0;
            color: var(--dusty-brown);
            font-weight: bold;
            cursor: default;
        }

        .cell.selected {
            background-color: var(--muted-blue) !important;
            color: var(--white);
        }

        .cell.error {
            color: var(--accent-orange);
        }

        /* Number Pad */
        .numpad {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        /* Win Modal */
        #win-card {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--white);
            padding: 40px;
            border: 4px solid var(--accent-orange);
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 100px rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        #win-card h2 {
            color: var(--accent-orange);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(36, 72, 85, 0.6);
            z-index: 90;
        }

        @media (max-width: 500px) {
            #grid { grid-template-columns: repeat(9, 35px); grid-template-rows: repeat(9, 35px); }
            .cell { width: 35px; height: 35px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Sudoku</h1>
        <p>Clean • Logical • Prometheus Edition</p>
    </header>

    <div class="controls">
        <button onclick="setDifficulty('easy')" id="btn-easy">Easy</button>
        <button onclick="setDifficulty('medium')" id="btn-medium">Medium</button>
        <button onclick="setDifficulty('hard')" id="btn-hard">Hard</button>
        <button onclick="resetGame()">Reset</button>
        <button class="music-btn" onclick="toggleMusic()" id="music-toggle">Mute</button>
    </div>

    <div id="grid"></div>

    <div class="numpad">
        <button onclick="inputNumber(1)">1</button>
        <button onclick="inputNumber(2)">2</button>
        <button onclick="inputNumber(3)">3</button>
        <button onclick="inputNumber(4)">4</button>
        <button onclick="inputNumber(5)">5</button>
        <button onclick="inputNumber(6)">6</button>
        <button onclick="inputNumber(7)">7</button>
        <button onclick="inputNumber(8)">8</button>
        <button onclick="inputNumber(9)">9</button>
        <button onclick="inputNumber(0)" style="border-color: var(--accent-orange);">⌫</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="win-card">
        <h2>VICTORY!</h2>
        <p>You solved the puzzle.</p><br>
        <button onclick="closeWinCard()">Play Again</button>
    </div>

    <audio id="bg-audio" loop>
        <source src="songbg.mp3" type="audio/mpeg">
    </audio>

    <script>
        let selectedCell = null;
        let difficulty = 'easy';
        let solution = [];
        let initialGrid = [];
        const audio = document.getElementById('bg-audio');
        let musicOn = false;

        function toggleMusic() {
            musicOn = !musicOn;
            const btn = document.getElementById('music-toggle');
            if (musicOn) {
                audio.play();
                btn.innerText = "🔊";
                btn.style.backgroundColor = "var(--muted-blue)";
            } else {
                audio.pause();
                btn.innerText = "🔇";
                btn.style.backgroundColor = "transparent";
            }
        }

        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + level).classList.add('active');
            generateGame();
        }

        function generateGame() {
            // Simple Sudoku Generation Logic
            // 1. Generate full solved grid
            solution = generateSolvedGrid();
            // 2. Remove numbers based on difficulty
            let attempts = difficulty === 'easy' ? 30 : difficulty === 'medium' ? 45 : 55;
            initialGrid = solution.map(row => [...row]);
            
            while (attempts > 0) {
                let r = Math.floor(Math.random() * 9);
                let c = Math.floor(Math.random() * 9);
                if (initialGrid[r][c] !== 0) {
                    initialGrid[r][c] = 0;
                    attempts--;
                }
            }
            drawGrid();
        }

        function generateSolvedGrid() {
            let grid = Array(9).fill().map(() => Array(9).fill(0));
            solve(grid);
            return grid;
        }

        function solve(grid) {
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    if (grid[row][col] === 0) {
                        let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                        for (let n of nums) {
                            if (isValid(grid, row, col, n)) {
                                grid[row][col] = n;
                                if (solve(grid)) return true;
                                grid[row][col] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }

        function isValid(grid, r, c, n) {
            for (let i = 0; i < 9; i++) {
                if (grid[r][i] === n || grid[i][c] === n) return false;
            }
            let rs = Math.floor(r / 3) * 3;
            let cs = Math.floor(c / 3) * 3;
            for (let i = rs; i < rs + 3; i++) {
                for (let j = cs; j < cs + 3; j++) {
                    if (grid[i][j] === n) return false;
                }
            }
            return true;
        }

        function drawGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (initialGrid[r][c] !== 0) {
                        cell.innerText = initialGrid[r][c];
                        cell.classList.add('fixed');
                    } else {
                        cell.addEventListener('click', () => selectCell(cell, r, c));
                    }
                    cell.id = `cell-${r}-${c}`;
                    container.appendChild(cell);
                }
            }
        }

        function selectCell(cell, r, c) {
            if (selectedCell) selectedCell.element.classList.remove('selected');
            selectedCell = { element: cell, row: r, col: c };
            cell.classList.add('selected');
        }

        function inputNumber(num) {
            if (!selectedCell) return;
            
            if (num === 0) {
                selectedCell.element.innerText = '';
            } else {
                selectedCell.element.innerText = num;
                if (num !== solution[selectedCell.row][selectedCell.col]) {
                    selectedCell.element.classList.add('error');
                } else {
                    selectedCell.element.classList.remove('error');
                    checkWin();
                }
            }
        }

        function checkWin() {
            const cells = document.querySelectorAll('.cell');
            let complete = true;
            cells.forEach(c => {
                let [_, r, col] = c.id.split('-').map(Number);
                if (c.innerText == "" || parseInt(c.innerText) !== solution[r][col]) {
                    complete = false;
                }
            });
            if (complete) {
                document.getElementById('win-card').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            }
        }

        function resetGame() {
            generateGame();
        }

        function closeWinCard() {
            document.getElementById('win-card').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            generateGame();
        }

        // Handle physical keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key >= 1 && e.key <= 9) inputNumber(parseInt(e.key));
            if (e.key === 'Backspace' || e.key === 'Delete') inputNumber(0);
        });

        // Start game
        setDifficulty('easy');
    </script>
</body>
</html>
